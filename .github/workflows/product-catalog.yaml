name: Product Catalog CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  SERVICE_DIR: src/product-catalog
  IMAGE_NAME: product-catalog-service

jobs:

####################################
# BUILD
####################################

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/product-catalog

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go mod download

      - run: go build -v .

      - run: go test ./...

####################################
# LINT
####################################

  Code-quality-Lint:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/product-catalog

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go mod download

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          working-directory: src/product-catalog

####################################
# DOCKER
####################################

  docker:

    needs:
      - build

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./src/product-catalog
          file: ./src/product-catalog/Dockerfile
          push: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/product-catalog-service:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/product-catalog-service:latest

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_number }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


  push-image:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - uses: docker/build-push-action@v6
      with:
        context: src/product-catalog
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_number }}